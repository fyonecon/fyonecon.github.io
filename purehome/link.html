        <script>
            (function () { // 反爬虫
                const sveltekit_body = document.getElementById("sveltekit-body");
                const sveltekit_script = document.getElementById("sveltekit-script").value.match(/<script>([\s\S]*?)<\/script>/i);
                let js = 'console.error("Null sveltekit.body");';
                if (sveltekit_script) {js = sveltekit_script[1];}
                const index_func = {
                    browser_fn_state: function (){
                        return !( navigator.webdriver || !window.localStorage || !window.indexedDB || (navigator.languages.length<1) || (window.navigator.hardwareConcurrency<2) );
                    },
                    screen_state: function (){
                        let inner_w = window.innerWidth;let inner_h = window.innerHeight;
                        let screen_w = window.screen.width;let screen_h = window.screen.height;
                        return !(inner_w < 220 || inner_h < 220 || screen_w < 220 || screen_h < 220);
                    },
                };
                if (index_func.browser_fn_state() && index_func.screen_state()) { // Run
                    const script = document.createElement("script");
                    script.textContent = js;
                    sveltekit_body.classList.remove("hide");
                    sveltekit_body.innerHTML = "";
                    sveltekit_body.appendChild(script);
                }else{ // block
                    sveltekit_body.classList.remove("hide");
                    sveltekit_body.innerHTML = `
                        <h3 style="margin: 60px 0 0 0; color: orangered; padding: 10px 15px; word-break: break-all; word-wrap: break-word; text-align: center; ">Please manually refresh the page, or change the browser to open the page. </h3>

                    `;
